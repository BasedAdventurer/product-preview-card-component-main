<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>
    <article>
      <section class="product__card">
        <div class="container">
          <div class="img__wrapper">
            <picture>
              <source media="(min-width: 768px)" srcset="assets/images/image-product-desktop.jpg">
              <img src="assets/images/image-product-mobile.jpg" alt="product-image" loading="lazy">
            </picture>
          </div>

          <div class="text__content">
            <span class="tag">PERFUME</span>
            <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>
            <p class="product-desc">A floral, solar and voluptuos interpretation composed by Olivier Polge, Perfurmer-creator for the House of CHANEL</p>

            <div class="product-price">
              <ins class="discount-price">$149.99</ins>
              <del class="old-price">$169.99</del>
            </div>

            <button class="btn"><img src="assets/images/icon-cart.svg" alt="shopping-cart-icon">Add to Cart</button>
          </div>
        </div>
      </section>
    </article>
  </main>
  
</body>
</html>
